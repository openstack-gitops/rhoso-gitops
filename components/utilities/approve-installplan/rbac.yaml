---
# ClusterRole and binding so the OpenShift GitOps Argo CD application controller
# can approve OLM InstallPlans and read resources used by the approval Job.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: installplan-approver-role
rules:
  - apiGroups:
      - operators.coreos.com
    resources:
      - installplans
    verbs:
      - get
      - list
      - patch
  - apiGroups:
      - operator.openstack.org
    resources:
      - openstacks
    verbs:
      - get
      - list
  - apiGroups:
      - core.openstack.org
    resources:
      - openstackversions
    verbs:
      - get
      - list
      - patch
  - apiGroups:
      - apiextensions.k8s.io
    resources:
      - customresourcedefinitions
    verbs:
      - get
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: installplan-approver-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: installplan-approver-role
subjects:
  - kind: ServiceAccount
    name: openshift-gitops-argocd-application-controller
    namespace: openshift-gitops
