---
# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: rhoso-apps application template
templates:
  - application.yaml
tests:
  # Helm merges values; we cannot replace the whole applications map from tests.
  # Assert on one real Application from values.yaml via documentSelector.
  - it: renders openstack-controlplane Application from default values
    values:
      - ../values.yaml
    documentSelector:
      path: metadata.name
      value: openstack-controlplane
    asserts:
      - isKind:
          of: Application
      - equal:
          path: apiVersion
          value: argoproj.io/v1alpha1
      - equal:
          path: metadata.name
          value: openstack-controlplane
      - equal:
          path: metadata.namespace
          value: openshift-gitops
      - equal:
          path: metadata.finalizers[0]
          value: resources-finalizer.argocd.argoproj.io/foreground
      - equal:
          path: metadata.annotations["argocd.argoproj.io/sync-wave"]
          value: "10"
      - equal:
          path: spec.project
          value: default
      - equal:
          path: spec.source.repoURL
          value: https://github.com/openstack-k8s-operators/gitops
      - equal:
          path: spec.source.path
          value: example/controlplane
      - equal:
          path: spec.source.targetRevision
          value: v0.1.0
      - equal:
          path: spec.destination.server
          value: https://kubernetes.default.svc
      - equal:
          path: spec.syncPolicy.syncOptions[0]
          value: Prune=true

  - it: renders operator-dependencies with default background finalizer
    values:
      - ../values.yaml
    documentSelector:
      path: metadata.name
      value: operator-dependencies
    asserts:
      - equal:
          path: metadata.finalizers[0]
          value: resources-finalizer.argocd.argoproj.io/background

  - it: uses syncPolicy and ignores top-level syncOptions when both are set
    set:
      applicationNamespace: openshift-gitops
      destinationServer: https://kubernetes.default.svc
      applications:
        policy-merge-test:
          enabled: true
          repoURL: https://github.com/example/repo
          path: "."
          targetRevision: HEAD
          syncWave: "0"
          syncPolicy:
            automated:
              prune: true
            syncOptions:
              - FromNestedPolicy=true
          syncOptions:
            - FromTopLevel=true
    documentSelector:
      path: metadata.name
      value: policy-merge-test
    asserts:
      - lengthEqual:
          path: spec.syncPolicy.syncOptions
          count: 1
      - equal:
          path: spec.syncPolicy.syncOptions[0]
          value: FromNestedPolicy=true

  - it: uses top-level syncOptions when syncPolicy is unset
    set:
      applicationNamespace: openshift-gitops
      destinationServer: https://kubernetes.default.svc
      applications:
        syncopt-only:
          enabled: true
          repoURL: https://github.com/example/repo
          path: "."
          targetRevision: main
          syncWave: "0"
          syncOptions:
            - OnlyFromTopLevel=true
    documentSelector:
      path: metadata.name
      value: syncopt-only
    asserts:
      - equal:
          path: spec.syncPolicy.syncOptions[0]
          value: OnlyFromTopLevel=true
      - notExists:
          path: spec.syncPolicy.automated

  - it: defaults syncWave to 0 when omitted
    set:
      applicationNamespace: openshift-gitops
      destinationServer: https://kubernetes.default.svc
      applications:
        no-wave:
          enabled: true
          repoURL: https://github.com/example/repo
          path: "."
          targetRevision: main
          syncOptions:
            - Prune=true
    documentSelector:
      path: metadata.name
      value: no-wave
    asserts:
      - equal:
          path: metadata.annotations["argocd.argoproj.io/sync-wave"]
          value: "0"

  - it: omits spec.source.kustomize when not set in values
    values:
      - ../values.yaml
    documentSelector:
      path: metadata.name
      value: operator-dependencies
    asserts:
      - notExists:
          path: spec.source.kustomize

  - it: renders spec.source.kustomize when applications entry sets kustomize
    set:
      applicationNamespace: openshift-gitops
      destinationServer: https://kubernetes.default.svc
      applications:
        kustom-test:
          enabled: true
          repoURL: https://github.com/example/repo
          path: examples/foo
          targetRevision: main
          syncWave: "0"
          syncOptions:
            - Prune=true
          kustomize:
            namePrefix: dev-
            components:
              - https://github.com/example/components/overlay
    documentSelector:
      path: metadata.name
      value: kustom-test
    asserts:
      - equal:
          path: spec.source.kustomize.namePrefix
          value: dev-
      - equal:
          path: spec.source.kustomize.components[0]
          value: https://github.com/example/components/overlay

  - it: fails values schema when repoURL is missing
    set:
      applicationNamespace: openshift-gitops
      destinationServer: https://kubernetes.default.svc
      applications:
        bad:
          enabled: true
          path: "."
          targetRevision: main
          syncWave: "0"
          syncOptions: []
    asserts:
      - failedTemplate:
          errorPattern: repoURL

  - it: fails values schema when destinationServer is not an https URI
    set:
      applicationNamespace: openshift-gitops
      destinationServer: http://insecure.example
      applications:
        a:
          enabled: true
          repoURL: https://github.com/example/repo
          path: "."
          targetRevision: main
          syncWave: "0"
          syncOptions: []
    asserts:
      - failedTemplate:
          errorPattern: destinationServer

  - it: fails values schema when finalizer is not allowed
    set:
      applicationNamespace: openshift-gitops
      destinationServer: https://kubernetes.default.svc
      applications:
        bad:
          enabled: true
          repoURL: https://github.com/example/repo
          path: "."
          targetRevision: main
          syncWave: "0"
          syncOptions: []
          finalizers:
            - resources-finalizer.argocd.argoproj.io/invalid
    asserts:
      - failedTemplate:
          errorPattern: finalizers
